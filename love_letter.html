<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Love Letter</title>
    <style>
        body {
            background-color: #fbeffb;
            color: #c71585;
            font-family: "Arial", sans-serif;
            text-align: center;
            padding: 50px;
            animation: fadeIn 2s;
        }
        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }
        h1 {
            font-size: 2.5em;
            margin-bottom: 20px;
        }
        p {
            font-size: 1.5em;
            margin: 20px 0;
            transition: transform 0.5s;
        }
        p:hover {
            transform: scale(1.1);
        }
        .heart {
            color: red;
            font-size: 2em;
            animation: heartbeat 1.5s infinite;
        }
        @keyframes heartbeat {
            0%, 20%, 40%, 60%, 80%, 100% {
                transform: scale(1);
            }
            10%, 30%, 50%, 70%, 90% {
                transform: scale(1.3);
            }
        }
    </style>
</head>
<body>
    <h1>My Dearest Love</h1>
    <p class="heart">❤️</p>
    <p>saya minta maaf banyak banyak kat sayangg.. saya caring pasal sayang tauuu</p>
    <p class="heart">❤️</p>
    <p>i love you so much sayangg</p>
    <p class="heart">❤️</p>
</body>
</html>
