<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Romantic Apology</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            background: linear-gradient(45deg, #ff99cc, #66ccff);
            animation: gradient 15s ease infinite;
            overflow: hidden;
            position: relative;
        }
        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }
        h1 {
            color: white;
            text-align: center;
            font-size: 3em;
            animation: textGlow 1.5s infinite;
        }
        @keyframes textGlow {
            0% { text-shadow: 0 0 5px #fff, 0 0 10px #ff66b2, 0 0 15px #ff66b2; }
            50% { text-shadow: 0 0 10px #fff, 0 0 20px #ff66b2, 0 0 30px #ff66b2; }
            100% { text-shadow: 0 0 5px #fff, 0 0 10px #ff66b2, 0 0 15px #ff66b2; }
        }
        .heart {
            display: inline-block;
            width: 50px;
            height: 50px;
            background: red;
            position: relative;
            margin: 10px;
            animation: float 3s ease-in-out infinite;
        }
        .heart:before,
        .heart:after {
            content: '';
            width: 50px;
            height: 50px;
            background: red;
            border-radius: 50%;
            position: absolute;
        }
        .heart:before {
            top: -25px;
            left: 0;
        }
        .heart:after {
            left: 25px;
            top: 0;
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }
    </style>
</head>
<body>
    <h1>💖 saya minta maaf banyak banyak kat sayangg.. saya caring pasal sayang tauuu 💖</h1>
    <h1>💖 i love you so much sayangg 💖</h1>
    <div class="heart"></div>
    <div class="heart"></div>
    <div class="heart"></div>
</body>
</html>
