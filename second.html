<!DOCTYPE html>\n<html lang=\"en\">\n<head>\n    <meta charset=\"UTF-8\">\n    <meta name=\"viewport\" content=\"width=device-width, initial-scale=1.0\">\n    <title>Apology Message</title>\n    <style>\n        body {\n            background: linear-gradient(90deg, #ff7e5f, #feb47b);\n            color: white;\n            display: flex;\n            flex-direction: column;\n            align-items: center;\n            justify-content: center;\n            height: 100vh;\n            font-family: 'Arial', sans-serif;\n            overflow: hidden;\n            position: relative;\n        }\n        h1 {\n            animation: fadeIn 2s;\n            text-align: center;\n        }\n        p {\n            animation: slideIn 2s;\n            text-align: center;\n            margin: 10px 0;\n        }\n        button {\n            background-color: #ff6f61;\n            border: none;\n            border-radius: 5px;\n            color: white;\n            padding: 10px 20px;\n            cursor: pointer;\n            font-size: 16px;\n            margin-top: 20px;\n            transition: background-color 0.3s;\n        }\n        button:hover {\n            background-color: #ff4c29;\n        }\n        @keyframes fadeIn {\n            from { opacity: 0; }\n            to { opacity: 1; }\n        }\n        @keyframes slideIn {\n            from { transform: translateY(-20px); opacity: 0; }\n            to { transform: translateY(0); opacity: 1; }\n        }\n        .heart {\n            position: absolute;\n            top: 0;\n            width: 20px;\n            height: 20px;\n            background-color: red;\n            transform: rotate(45deg);\n            animation: float 5s infinite;\n        }\n        .heart:before, .heart:after {\n            content: '';\n            position: absolute;\n            top: -10px;\n            width: 20px;\n            height: 20px;\n            background-color: red;\n            border-radius: 50%;\n        }\n        .heart:before {\n            left: 0;\n        }\n        .heart:after {\n            left: 10px;\n        }\n        @keyframes float {\n            0% { transform: translateY(0); }\n            50% { transform: translateY(-20px); }\n            100% { transform: translateY(0); }\n        }\n    </style>\n</head>\n<body>\n    <div class=\"heart\"></div>\n    <h1>I'm sorry, my love.</h1>\n    <p>I really care about you.</p>\n    <p>I love you so much, my love.</p>\n    <button onclick=\"window.location.href='index.html'\">Go Back</button>\n</body>\n</html>\n
